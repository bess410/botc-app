<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Random Roll | Генератор ролей для игры</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1100px;
            padding: 28px 24px 36px;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: #1e2f3c;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sub {
            color: #4a6272;
            border-left: 4px solid #c44536;
            padding-left: 14px;
            margin: 12px 0 24px 0;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-weight: 600;
            color: #1f3e4b;
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        input {
            flex: 2;
            min-width: 140px;
            padding: 14px 18px;
            font-size: 1.2rem;
            font-weight: 600;
            border: 2px solid #cbdbe0;
            border-radius: 44px;
            background: white;
            text-align: center;
        }

        button {
            background: #2c5a6e;
            border: none;
            padding: 14px 28px;
            border-radius: 44px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #c44536;
            transform: scale(0.97);
        }

        .random-btn {
            background: #7e5a3c;
            margin-top: 8px;
            width: 100%;
        }

        .random-btn:hover {
            background: #a06e48;
        }

        .result-card {
            background: #f8fafc;
            border-radius: 36px;
            margin-top: 28px;
            padding: 20px;
        }

        .section {
            margin-bottom: 24px;
            border-bottom: 1px solid #dce5ec;
            padding-bottom: 16px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .roles-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .role-tag {
            background: white;
            border-radius: 60px;
            padding: 6px 16px;
            border: 1px solid #cbdbe0;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .drunkard-tag {
            background: #fff3e0;
            border-color: #e6a017;
            color: #8a6100;
            font-weight: 600;
        }

        .citizen-card {
            background: white;
            border-radius: 20px;
            padding: 12px;
            border: 1px solid #e2edf2;
            width: 100%;
            margin-bottom: 12px;
        }

        .citizen-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .citizen-effect {
            background: #f0f4fa;
            border-radius: 16px;
            padding: 8px 12px;
            font-size: 0.85rem;
            color: #2c5a6e;
            margin-top: 6px;
            border-left: 3px solid #c44536;
        }

        .citizens-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.75rem;
            color: #6f8b9c;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎲 Генератор ролей</h1>
    <div class="sub">Демон всегда Чёрт. Прачка, Библиотекарь, Сыщик и Гадалка получают случайные цели</div>

    <div class="form-group">
        <label>👥 Количество игроков (5–15)</label>
        <div class="input-wrapper">
            <input type="number" id="playersInput" min="5" max="15" value="10">
            <button id="generateBtn">✨ Сгенерировать случайный состав</button>
        </div>
        <button id="randomBtn" class="random-btn">🎲 Ещё случайный состав</button>
    </div>

    <div id="resultContainer" style="display: none;">
        <div class="result-card">
            <div class="section">
                <div class="section-title">👹 Демон</div>
                <div id="demonList" class="roles-list"></div>
            </div>
            <div class="section">
                <div class="section-title">🔮 Прислужник</div>
                <div id="servantList" class="roles-list"></div>
            </div>
            <div class="section">
                <div class="section-title">🗡️ Изгои</div>
                <div id="outcastList" class="roles-list"></div>
            </div>
            <div class="section">
                <div class="section-title">🏘️ Горожане</div>
                <div id="citizenList" class="citizens-list"></div>
            </div>
        </div>
    </div>
    <footer>🎭 Прачка, Библиотекарь, Сыщик не могут выбрать себя. Гадалка не ставит метку на себя.</footer>
</div>

<script>
    // --------------------------------------------------------------
    // 1. БАЗОВОЕ РАСПРЕДЕЛЕНИЕ
    // --------------------------------------------------------------
    const ROLE_COUNTS = {
        5:  { citizens: 3, outcasts: 0, servants: 1, demon: 1 },
        6:  { citizens: 3, outcasts: 1, servants: 1, demon: 1 },
        7:  { citizens: 5, outcasts: 0, servants: 1, demon: 1 },
        8:  { citizens: 5, outcasts: 1, servants: 1, demon: 1 },
        9:  { citizens: 5, outcasts: 2, servants: 1, demon: 1 },
        10: { citizens: 7, outcasts: 0, servants: 2, demon: 1 },
        11: { citizens: 7, outcasts: 1, servants: 2, demon: 1 },
        12: { citizens: 7, outcasts: 2, servants: 2, demon: 1 },
        13: { citizens: 9, outcasts: 0, servants: 3, demon: 1 },
        14: { citizens: 9, outcasts: 1, servants: 3, demon: 1 },
        15: { citizens: 9, outcasts: 2, servants: 3, demon: 1 }
    };

    // --------------------------------------------------------------
    // 2. ПУЛЫ РОЛЕЙ
    // --------------------------------------------------------------
    const DEMON = "👹 Чёрт";

    const SERVANT_POOL = [
        { id: "poisoner", name: "🧪 Отравитель" },
        { id: "harlot", name: "💋 Блудница" },
        { id: "baron", name: "🧬 Барон" }
    ];

    const OUTCAST_UNIQUE_POOL = [
        { id: "drunkard", name: "🍺 Пьяница", effect: "drunk" },
        { id: "butler", name: "🧤 Дворецкий", effect: "none" },
        { id: "recluse", name: "🚪 Затворник", effect: "none" },
        { id: "saint", name: "✝️ Святой", effect: "none" }
    ];

    const FACELESS_OUTCAST = { id: "faceless", name: "👤 Безликий", effect: "none" };

    const CITIZEN_NAMES = [
        "🧼 Прачка", "📚 Библиотекарь", "🔍 Сыщик", "🍲 Повар", "❤️ Эмпат",
        "🔮 Гадалка", "⚰️ Гробовщик", "🙏 Монах", "🐦‍⬛ Смотритель воронов",
        "🌸 Девственница", "⚔️ Истребитель", "🛡️ Солдат", "👑 Мэр"
    ];

    // --------------------------------------------------------------
    // 3. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // --------------------------------------------------------------
    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getRandomUniqueItems(arr, count) {
        if (count > arr.length) count = arr.length;
        const shuffled = shuffleArray([...arr]);
        return shuffled.slice(0, count);
    }

    // --------------------------------------------------------------
    // 4. ЛОГИКА БАРОНА
    // --------------------------------------------------------------
    function applyBaronEffect(counts) {
        let { citizens, outcasts, servants, demon } = counts;
        let remove = Math.min(2, citizens);
        citizens -= remove;
        outcasts += remove;
        return { citizens, outcasts, servants, demon };
    }

    // --------------------------------------------------------------
    // 5. ГЕНЕРАЦИЯ ЭФФЕКТОВ
    // --------------------------------------------------------------
    
    // Прачка: два игрока, среди них хотя бы один горожанин.
    // Прачка не может выбрать саму себя
    function generateWasherwomanEffect(allPlayers, citizenRoles, drunkardRole, washerwomanRole) {
        if (citizenRoles.length === 0) return { player1: "нет", player2: "горожан", shownRole: "нет" };
        
        // Убираем из allPlayers саму прачку
        const otherPlayers = allPlayers.filter(p => p.role !== washerwomanRole);
        if (otherPlayers.length < 2) return { player1: "недостаточно", player2: "игроков", shownRole: "нет" };
        
        let players = shuffleArray([...otherPlayers]);
        let player1 = players[0];
        let player2 = players[1];
        
        // Проверяем, есть ли среди них горожанин
        let hasCitizen = [player1, player2].some(p => citizenRoles.includes(p.role));
        
        if (!hasCitizen) {
            // Заменяем второго на случайного горожанина (не прачку и не пьяницу, если возможно)
            const availableCitizens = citizenRoles.filter(r => r !== washerwomanRole);
            if (availableCitizens.length > 0) {
                player2 = { role: getRandomItem(availableCitizens), type: "citizen" };
            } else {
                player2 = { role: getRandomItem(citizenRoles), type: "citizen" };
            }
            hasCitizen = true;
        }
        
        // Проверяем, является ли кто-то из выбранных пьяницей
        const isPlayer1Drunkard = (player1.role === drunkardRole);
        const isPlayer2Drunkard = (player2.role === drunkardRole);
        
        let shownRole = null;
        let finalPlayer1 = player1.role;
        let finalPlayer2 = player2.role;
        
        if (isPlayer1Drunkard) {
            // Если первый пьяница — второй должен быть горожанином
            if (!citizenRoles.includes(player2.role)) {
                const nonDrunkardCitizens = citizenRoles.filter(r => r !== drunkardRole && r !== washerwomanRole);
                if (nonDrunkardCitizens.length > 0) {
                    finalPlayer2 = getRandomItem(nonDrunkardCitizens);
                } else {
                    finalPlayer2 = getRandomItem(citizenRoles.filter(r => r !== washerwomanRole));
                }
            }
            shownRole = finalPlayer2;
        } 
        else if (isPlayer2Drunkard) {
            // Если второй пьяница — первый должен быть горожанином
            if (!citizenRoles.includes(player1.role)) {
                const nonDrunkardCitizens = citizenRoles.filter(r => r !== drunkardRole && r !== washerwomanRole);
                if (nonDrunkardCitizens.length > 0) {
                    finalPlayer1 = getRandomItem(nonDrunkardCitizens);
                } else {
                    finalPlayer1 = getRandomItem(citizenRoles.filter(r => r !== washerwomanRole));
                }
            }
            shownRole = finalPlayer1;
        }
        else {
            const citizenAmong = [player1, player2].find(p => citizenRoles.includes(p.role));
            shownRole = citizenAmong ? citizenAmong.role : citizenRoles[0];
        }
        
        return {
            player1: finalPlayer1,
            player2: finalPlayer2,
            shownRole: shownRole
        };
    }

    // Библиотекарь: два ЛЮБЫХ игрока, но среди них хотя бы один изгой.
    // Библиотекарь не может выбрать сам себя
    function generateLibrarianEffect(allPlayers, outcastRoles, librarianRole) {
        if (outcastRoles.length === 0) return { player1: "нет", player2: "изгоев", shownRole: "нет" };
        
        // Убираем из allPlayers самого библиотекаря
        const otherPlayers = allPlayers.filter(p => p.role !== librarianRole);
        if (otherPlayers.length < 2) return { player1: "недостаточно", player2: "игроков", shownRole: "нет" };
        
        let players = shuffleArray([...otherPlayers]);
        let player1 = players[0];
        let player2 = players[1];
        
        const hasOutcast = [player1, player2].some(p => outcastRoles.includes(p.role));
        
        if (!hasOutcast) {
            const randomOutcast = { role: getRandomItem(outcastRoles), type: "outcast" };
            player2 = randomOutcast;
        }
        
        const outcastAmong = [player1, player2].find(p => outcastRoles.includes(p.role));
        const shownRole = outcastAmong ? outcastAmong.role : outcastRoles[0];
        
        return {
            player1: player1.role,
            player2: player2.role,
            shownRole: shownRole
        };
    }

    // Сыщик: два ЛЮБЫХ игрока, но среди них хотя бы один прислужник.
    // Сыщик не может выбрать сам себя
    function generateInvestigatorEffect(allPlayers, servantRoles, investigatorRole) {
        if (servantRoles.length === 0) return { player1: "нет", player2: "прислужников", shownRole: "нет" };
        
        // Убираем из allPlayers самого сыщика
        const otherPlayers = allPlayers.filter(p => p.role !== investigatorRole);
        if (otherPlayers.length < 2) return { player1: "недостаточно", player2: "игроков", shownRole: "нет" };
        
        let players = shuffleArray([...otherPlayers]);
        let player1 = players[0];
        let player2 = players[1];
        
        const hasServant = [player1, player2].some(p => servantRoles.includes(p.role));
        
        if (!hasServant) {
            const randomServant = { role: getRandomItem(servantRoles), type: "servant" };
            player2 = randomServant;
        }
        
        const servantAmong = [player1, player2].find(p => servantRoles.includes(p.role));
        const shownRole = servantAmong ? servantAmong.role : servantRoles[0];
        
        return {
            player1: player1.role,
            player2: player2.role,
            shownRole: shownRole
        };
    }

    // Гадалка: ложный след на горожанине или изгое (НЕ на гадалке)
    function generateFortuneTellerEffect(validTargets, fortuneTellerRole) {
        const filteredTargets = validTargets.filter(target => target !== fortuneTellerRole);
        if (filteredTargets.length === 0) return { targetRole: "нет целей" };
        const target = getRandomItem(filteredTargets);
        return { targetRole: target };
    }

    // --------------------------------------------------------------
    // 6. ГЕНЕРАЦИЯ СЛУЧАЙНОГО СОСТАВА
    // --------------------------------------------------------------
    function generateRandomSetup(playersCount) {
        if (!ROLE_COUNTS[playersCount]) return null;

        let counts = { ...ROLE_COUNTS[playersCount] };
        const demon = DEMON;
        const servantObj = getRandomItem(SERVANT_POOL);
        const servant = servantObj.name;
        if (servantObj.id === "baron") {
            counts = applyBaronEffect(counts);
        }

        const outcastsNeeded = counts.outcasts;
        let outcastsRoles = [];
        let hasDrunkardAmongOutcasts = false;
        
        if (outcastsNeeded > 0) {
            const shuffledUnique = shuffleArray([...OUTCAST_UNIQUE_POOL]);
            const uniqueTaken = shuffledUnique.slice(0, Math.min(outcastsNeeded, OUTCAST_UNIQUE_POOL.length));
            outcastsRoles.push(...uniqueTaken.map(r => r.name));
            hasDrunkardAmongOutcasts = uniqueTaken.some(r => r.id === "drunkard");
            const remaining = outcastsNeeded - uniqueTaken.length;
            for (let i = 0; i < remaining; i++) {
                outcastsRoles.push(FACELESS_OUTCAST.name);
            }
        }

        let citizensNeeded = counts.citizens;
        let citizenPool = [...CITIZEN_NAMES];
        const hasOutcasts = outcastsNeeded > 0;
        if (!hasOutcasts) {
            citizenPool = citizenPool.filter(c => c !== "📚 Библиотекарь");
        }
        
        let citizensRoles = getRandomUniqueItems(citizenPool, citizensNeeded);
        
        let drunkardCitizenIndex = -1;
        let drunkardRole = null;
        if (hasDrunkardAmongOutcasts && citizensRoles.length > 0) {
            drunkardCitizenIndex = Math.floor(Math.random() * citizensRoles.length);
            drunkardRole = citizensRoles[drunkardCitizenIndex];
            citizensNeeded += 1;
            const currentCitizens = citizensRoles.length;
            const extraNeeded = citizensNeeded - currentCitizens;
            if (extraNeeded > 0) {
                const fullCitizenPool = CITIZEN_NAMES.filter(c => !citizensRoles.includes(c));
                const extraNames = getRandomUniqueItems(fullCitizenPool, extraNeeded);
                citizensRoles.push(...extraNames);
            }
        }

        let citizensList = citizensRoles.map((role, idx) => ({
            role: role,
            isDrunkard: (idx === drunkardCitizenIndex && hasDrunkardAmongOutcasts)
        }));

        // Собираем ВСЕХ игроков для выбора целей
        const allPlayers = [
            { role: demon, type: "demon" },
            { role: servant, type: "servant" },
            ...outcastsRoles.map(r => ({ role: r, type: "outcast" })),
            ...citizensList.map(c => ({ role: c.role, type: "citizen" }))
        ];

        const citizenRolesOnly = citizensList.map(c => c.role);
        const outcastRolesOnly = outcastsRoles;
        const servantRolesOnly = [servant];
        const fortuneTellerTargets = [...citizenRolesOnly, ...outcastsRoles];

        // Генерируем эффекты
        const effects = {};
        
        for (let citizen of citizensList) {
            if (citizen.role === "🧼 Прачка") {
                effects[citizen.role] = generateWasherwomanEffect(allPlayers, citizenRolesOnly, drunkardRole, citizen.role);
            }
            if (citizen.role === "📚 Библиотекарь") {
                effects[citizen.role] = generateLibrarianEffect(allPlayers, outcastRolesOnly, citizen.role);
            }
            if (citizen.role === "🔍 Сыщик") {
                effects[citizen.role] = generateInvestigatorEffect(allPlayers, servantRolesOnly, citizen.role);
            }
            if (citizen.role === "🔮 Гадалка") {
                effects[citizen.role] = generateFortuneTellerEffect(fortuneTellerTargets, citizen.role);
            }
        }

        return {
            demon,
            servant,
            outcasts: outcastsRoles,
            citizens: citizensList,
            drunkardCitizenIndex,
            hasDrunkard: hasDrunkardAmongOutcasts,
            effects
        };
    }

    // --------------------------------------------------------------
    // 7. ОТРИСОВКА UI
    // --------------------------------------------------------------
    function renderResult(setup) {
        if (!setup) return;

        document.getElementById('demonList').innerHTML = `<div class="role-tag">${setup.demon}</div>`;
        document.getElementById('servantList').innerHTML = `<div class="role-tag">${setup.servant}</div>`;
        
        const outcastsHtml = setup.outcasts.map(o => `<div class="role-tag">${o}</div>`).join('');
        document.getElementById('outcastList').innerHTML = outcastsHtml || '<div class="role-tag">—</div>';
        
        const citizensContainer = document.getElementById('citizenList');
        citizensContainer.innerHTML = '';
        
        setup.citizens.forEach((citizen, index) => {
            const card = document.createElement('div');
            card.className = 'citizen-card';
            
            let displayName = citizen.role;
            if (setup.hasDrunkard && setup.drunkardCitizenIndex === index) {
                let cleanName = citizen.role.replace(/^[^\w\s]+/, '').trim();
                displayName = `🍺 ${cleanName} (пьяница)`;
                card.style.borderColor = '#e6a017';
                card.style.background = '#fff9ef';
            }
            
            let effectHtml = '';
            const effect = setup.effects[citizen.role];
            if (effect) {
                if (citizen.role === "🧼 Прачка") {
                    effectHtml = `<div class="citizen-effect">🎭 Выбраны игроки: ${effect.player1} и ${effect.player2}. Показан жетон: ${effect.shownRole}</div>`;
                } else if (citizen.role === "📚 Библиотекарь") {
                    effectHtml = `<div class="citizen-effect">📖 Выбраны игроки: ${effect.player1} и ${effect.player2}. Показан жетон: ${effect.shownRole}</div>`;
                } else if (citizen.role === "🔍 Сыщик") {
                    effectHtml = `<div class="citizen-effect">🕵️ Выбраны игроки: ${effect.player1} и ${effect.player2}. Показан жетон: ${effect.shownRole}</div>`;
                } else if (citizen.role === "🔮 Гадалка") {
                    effectHtml = `<div class="citizen-effect">🌀 Метка «ложный след» поставлена на ${effect.targetRole}.</div>`;
                }
            }
            
            card.innerHTML = `
                <div class="citizen-name">${displayName}</div>
                ${effectHtml}
            `;
            citizensContainer.appendChild(card);
        });
        
        document.getElementById('resultContainer').style.display = 'block';
    }

    function generateAndShow() {
        const input = document.getElementById('playersInput');
        let players = parseInt(input.value, 10);
        if (isNaN(players)) players = 10;
        if (players < 5) players = 5;
        if (players > 15) players = 15;
        input.value = players;
        
        const setup = generateRandomSetup(players);
        if (setup) {
            renderResult(setup);
        } else {
            alert('Ошибка генерации состава');
        }
    }

    // --------------------------------------------------------------
    // 8. ИНИЦИАЛИЗАЦИЯ
    // --------------------------------------------------------------
    document.getElementById('generateBtn').addEventListener('click', generateAndShow);
    document.getElementById('randomBtn').addEventListener('click', generateAndShow);
    document.getElementById('playersInput').addEventListener('change', generateAndShow);
    document.getElementById('playersInput').addEventListener('input', generateAndShow);

    generateAndShow();
</script>
</body>
</html>
